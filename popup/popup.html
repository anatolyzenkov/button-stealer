<!DOCTYPE html>
<html>

<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Button Stealer</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel="shortcut icon" href="/images/icon-196.png">
    <link rel="icon" href="/images/icon-32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel='stylesheet' type='text/css' media='screen' href='/styles/normalize.css'>
    <link rel='stylesheet' type='text/css' media='screen' href='popup.css'>
</head>

<body>
    <div id="main">
        <div id="backdrop">
            <div id="buttons"></div>
            <div id="backdrop-blur"></div>
        </div>
        <div id="dashboard" class="wrapper">
            <h1>Button Stealer</h1>
            <p class="grow">Do your usual online stuff and watch the collection of your stolen buttons grow.</p>
            <a href="/stolen-buttons/stolen-buttons.html" role="button" target="_blank" class="button label">Your Stash</a>
            <div id="footer">
                <p id="stat" class="label">…</p>
                <a class="icon-button" href="https://donate.stripe.com/dRmdRa833fou6nqgnP67S00" target="_blank" rel="noreferrer" aria-label="Donate">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256"><rect width="256" height="256" fill="none"/><path d="M240,102c0,70-103.79,126.66-108.21,129a8,8,0,0,1-7.58,0C119.79,228.66,16,172,16,102A62.07,62.07,0,0,1,78,40c20.65,0,38.73,8.88,50,23.89C139.27,48.88,157.35,40,178,40A62.07,62.07,0,0,1,240,102Z"/></svg>
                </a>
            </div>
        </div>
    </div>
    <div id="slider-container">
        <div class="navbar">
            <h2 id="slider-header">Header</h2>
        </div>
        <div id="settings" class="view hidden">
            <div class="wrapper settings">
                <form id="ignore-form">
                    <h3>Ignore List</h3>
                    <input class="label" placeholder="example.com *.example.com" id="ignore" name="ignore"/>
                </form>
                <form id="maximum-form">
                    <h3>Maximum Buttons <span id="maximumValue"></span></h3>
                    <input class="label" type="range" min="100" max="1000" step="100" id="maximum" name="maximum" />
                </form>
                
                <form id="contentful-form">
                    <h3>Contentful Settings</h3>
                    <input class="label" type="password" id="contentManagementApiKey" name="contentManagementApiKey" placeholder="Content Management API Key"></input>
                    <input class="label" type="password" id="contentDeliveryApiKey" name="contentDeliveryApiKey" placeholder="Content Delivery API Key"></input>
                    <input class="label" type="password" id="spaceId" name="spaceId" placeholder="Space ID"></input>
                    <input class="label" type="text" id="contentTypeId" name="contentTypeId" placeholder="Content Type ID"></input>
                    <p>These settings are for author use only.</p>
                </form>
                <a id="remove-all" role="button" class="button critical label">Remove All Buttons</a>
            </div>
        </div>
    </div>
    <div id="switch">
        <div class="dash dash-0"></div>
        <div class="dash dash-1"></div>
        <div class="dash dash-2"></div>
    </div>
    <script src='popup.js'></script>
</body>

</html>
